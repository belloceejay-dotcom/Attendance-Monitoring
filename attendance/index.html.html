<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PUP Attendance Portal</title>

<style>
* {
  box-sizing: border-box;
  font-family: Arial, sans-serif;
}

body {
  margin: 0;
  background: #f5f5f5;
}

/* ========== SPLIT LAYOUT ========== */
.login-container {
  display: flex;
  min-height: 100vh;
}

/* LEFT SIDE */
.login-left {
  flex: 1;
  background: #7b1113;
  color: white;
  text-align: center;
  padding: 2rem;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

.login-left img {
  width: 100%;
  max-height: 400px;
  object-fit: cover;
  border-radius: 12px;
  margin-bottom: 1rem;
}

/* RIGHT SIDE */
.login-card {
  flex: 1;
  background: white;
  padding: 2rem;
  border-radius: 0; /* flat style */
  box-shadow: 0 20px 40px rgba(0,0,0,.1);
  display: flex;
  flex-direction: column;
  justify-content: center;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 10px;
  background: #7b1113;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.links {
  display: flex;
  justify-content: space-between;
  font-size: 12px;
  margin-top: 10px;
}

/* MOBILE */
@media(max-width:700px){
  .login-container {
    flex-direction: column;
  }
  .login-left {
    max-height: 300px;
  }
}
</style>
</head>

<body>

<div class="login-container">

  <!-- LEFT SIDE -->
  <div class="login-left">
    <img src="pupimage.jpg" alt="PUP Campus">
    <h2>PUP MAIN CAMPUS</h2>
    <p>Polytechnic University of the Philippines</p>
    <p>Mula Sa Yo, Para sa Bayan</p>
  </div>

  <!-- RIGHT SIDE -->
  <div class="login-card">
    <h3>Account Access</h3>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <select id="role">
      <option value="student">Student</option>
      <option value="teacher">Teacher</option>
      <option value="admin">Admin</option>
    </select>
    <label><input type="checkbox"> Remember me</label>
    <button onclick="login()">Login</button>
    <div class="links">
      <a href="#">Forgot?</a>
      <a href="#">Help</a>
    </div>
  </div>

</div>

<script>
function login(){
  alert("Login function here!");
}
</script>

</body>
</html>
